spring:
  datasource:
    url: jdbc:h2:mem:ltudm_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  data:
    redis:
      host: localhost
      port: 6379
  mail:
    host: localhost
    port: 2525
    username:
    password:

r2:
  endpoint: http://localhost:9000
  bucket: test-bucket
  access-key: test-access-key
  secret-key: test-secret-key
  region: us-east-1
  public-base-url: http://localhost:9000/test-bucket

jwt:
  secret: 0123456789abcdef0123456789abcdef
  access-token-expiration: 3600
  refresh-token-expiration: 604800
