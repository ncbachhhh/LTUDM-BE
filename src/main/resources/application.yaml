server:
  port: 8080
  servlet:
    context-path: /api/v1
  address: 0.0.0.0

spring:
  application:
    name: LTUDM-Backend
  datasource:
    url: ${MYSQL_URL}
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

r2:
  endpoint: ${R2_ENDPOINT}
  bucket: ${R2_BUCKET}
  access-key: ${R2_ACCESS_KEY}
  secret-key: ${R2_SECRET_KEY}
  region: auto
  public-base-url: ${R2_PUBLIC_BASE_URL:}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 3600       # 1 hour (seconds)
  refresh-token-expiration: 604800    # 7 days (seconds)
